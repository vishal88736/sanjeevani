# Default training configuration
batch_size: 8
eval_batch_size: 8
num_workers: 8

epochs: 20
max_steps: null            # if set, overrides epochs
gradient_accumulation_steps: 4

optimizer:
  name: adamw
  lr: 3.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-8

scheduler:
  name: linear_warmup_cosine   # linear_warmup_cosine | linear_warmup_constant | noam
  warmup_steps: 1000
  min_lr_ratio: 0.05

mixed_precision: true          # uses hardware.precision from top-level config
gradient_clip_norm: 1.0
gradient_checkpointing: true

early_stopping:
  enabled: true
  monitor: val_wer
  mode: min
  patience: 5
  min_delta: 0.001

checkpointing:
  save_every_n_steps: 500
  keep_last_n: 3
  save_best: true
  best_metric: val_wer
  best_mode: min
  resume_from: null   # path to a checkpoint dir/file to resume from

logging:
  log_every_n_steps: 50
  eval_every_n_steps: 500
