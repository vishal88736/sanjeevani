# IndicConformer 600M Multilingual (AI4Bharat) model configuration
name: indic_conformer
type: nemo_conformer   # dispatch key used by models/registry.py

# Hugging Face / NeMo model identifiers.
# The .nemo checkpoint is pulled from the HF Hub repo below.
hf_repo_id: ai4bharat/indicconformer_stt_multilingual
nemo_filename: indicconformer_multilingual_600m.nemo

# Local cache location once downloaded (kept out of git via checkpoints/.gitignore)
local_path: ./checkpoints/indic_conformer/indicconformer_multilingual_600m.nemo

sample_rate: 16000
supported_languages:
  - hi
  - bn
  - ta
  - te
  - mr
  - gu
  - kn
  - ml
  - pa
  - or
  - as
  - ur

decoding:
  strategy: beam       # greedy | beam
  beam_size: 8
  len_penalty: 0.6

# Fine-tuning behaviour
freeze_encoder: false
freeze_encoder_epochs: 0   # number of initial epochs to keep encoder frozen
dropout: 0.1
