# ai4bharat/IndicVoices dataset configuration
name: indicvoices
hf_repo_id: ai4bharat/IndicVoices

# HF datasets cache directory
cache_dir: ./data/hf_cache

# Streaming avoids downloading the full multi-TB corpus upfront.
# Set to false for full local materialization (needed for random-access
# training speed once you've picked a manageable language subset).
streaming: true

text_column: text
audio_column: audio
language_column: language

train_split: train
validation_split: valid
test_split: test

# Per-language row caps for quick experimentation. null = no cap.
max_samples_per_language: null

audio:
  target_sample_rate: 16000
  mono: true
  normalize: true
  trim_silence: true
  min_duration_sec: 0.5
  max_duration_sec: 30.0
  supported_formats:
    - wav
    - mp3
    - flac
    - ogg

tokenizer:
  # IndicConformer ships its own SentencePiece tokenizer inside the .nemo
  # archive; this is only used for the optional Whisper fallback path.
  type: sentencepiece
  vocab_size: 5000
  model_path: ./checkpoints/tokenizer/indicvoices_spm.model
